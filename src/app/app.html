<h1>📡 En direct de la Base de Données !</h1>

<div style="display: flex; gap: 15px; flex-wrap: wrap;">
  @for (p of persons; track $index) {
    <div style="border: 2px solid #3366cc; padding: 15px; border-radius: 8px;">
      <p><strong>Nom :</strong> {{ p.name }}</p>
      <p><strong>Ville :</strong> {{ p.city }}</p>
      <p><strong>Téléphone :</strong> {{ p.phoneNumber }}</p>
    </div>
  } @empty {
    <p>⏳ Chargement en cours... Ou alors ta table 'persons' est vide !</p>
  }
</div>
